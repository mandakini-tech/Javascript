<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Info Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        table {
            border-collapse: collapse;
            margin-top: 20px;
            width: 60%;
        }
        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        .hint {
            font-size: 16px;
            color: #555;
        }
    </style>
</head>
<body>

<h2>Keyboard Event Detector</h2>
<p class="hint">Click anywhere and press any key ⌨️</p>

<table>
    <tr>
        <th>Key</th>
        <th>KeyCode</th>
        <th>Code</th>
    </tr>
    <tr>
        <td id="key">-</td>
        <td id="keyCode">-</td>
        <td id="code">-</td>
    </tr>
</table>

<script>
   const insert=document.getElementById('insert');
   window.addEventListener('keydown',function(e){
       document.getElementById('key').innerText=e.key;
       document.getElementById('keyCode').innerText=e.keyCode;
       document.getElementById('code').innerText=e.code;
   });
</script>

</body>
</html>
