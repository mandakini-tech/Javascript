<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To‑Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="todo-app">
      <h2>To‑Do List</h2>
      <div class="row">
        <input type="text" id="task-input" placeholder="Enter Task...">
        <button onclick="addTask()" id="add-task">Add Task</button>
      </div>
      <ul id="task-list"></ul>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
