<!DOCTYPE html>
<html>
<head>
  <title>Toggle Example</title>
  <style>
    li {
      cursor: pointer;
      padding: 10px;
      font-size: 18px;
    }

    .checked {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>

  <h2>Single Task Example</h2>
  <ul>
    <li id="milk-task">Buy milk</li>
  </ul>

  <script>
    const task = document.getElementById("milk-task");

    task.addEventListener("click", function () {
      // This is the toggle in action!
      task.classList.toggle("checked");
    });
  </script>

</body>
</html>
