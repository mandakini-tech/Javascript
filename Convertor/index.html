<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Convertor</title>
    <link rel="stylesheet" href="style.css"/>
   
</head>
<body>
    <div class="container">
        <h2>Currency Convertor</h2>
        <form>
            <div class="amount">
                <p>Enter Amount</p>
                <input value="100" type="text"/>
                </div>
                <div class="dropdown">
                    <div class="form">
                        <p>From</p>
                        <div class="select-container">
                            <img src="https://flagsapi.com/US/flat/64.png">
                            <select name="from">
                                <option value="USD">USD</option>
                                 <option value="INR">INR</option>
                                 <option value="EUR">EUR</option>
                                 <option value="AUD">AUD</option>
                            </select>
                        </div>
                    </div>
                    <!-- <i class="https://static.vecteezy.com/system/resources/previews/000/592/940/original/vector-exchange-icon.jpg"></i> -->
                    <!-- <img src="https://static.vecteezy.com/system/resources/previews/000/592/940/original/vector-exchange-icon.jpg"> -->
                    <div class="to"></div>
                        <p>To</p>
                        <div class="select-container">
                            <img src="https://flagsapi.com/IN/flat/64.png">
                            <select name="from">
                                <option value="USD">USD</option>
                                 <option value="INR" selected>INR</option>
                                 <option value="EUR">EUR</option>
                                 <option value="AUD">AUD</option>
                            </select>
                        </div>
                    </div>
                      <div class="msg">1USD=80INR</div>
                <button>Get Exchange Rate</button>
                </div>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
